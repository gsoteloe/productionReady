<svg viewBox="0 0 660 400" xmlns="http://www.w3.org/2000/svg" font-family="JetBrains Mono, Fira Code, monospace">

  <!-- Background -->
  <rect width="660" height="400" fill="#ffffff" rx="12"/>

  <!-- Title -->
  <text x="330" y="36" text-anchor="middle" font-size="13" font-weight="700" fill="#0A2540" letter-spacing="-0.3">Sin NodeLocal DNSCache vs. Con NodeLocal DNSCache</text>

  <!-- Divider -->
  <line x1="330" y1="55" x2="330" y2="390" stroke="#E6EBF1" stroke-width="1" stroke-dasharray="6,4"/>

  <!-- === LEFT SIDE: Sin NodeLocal === -->
  <text x="165" y="72" text-anchor="middle" font-size="11" font-weight="700" fill="#DC2626">Sin NodeLocal DNSCache</text>

  <!-- Node 1 -->
  <rect x="30" y="88" width="270" height="32" rx="6" fill="#F6F8FA" stroke="#E6EBF1" stroke-width="1"/>
  <text x="55" y="102" font-size="9" fill="#425466">Nodo A</text>
  <rect x="60" y="94" width="100" height="20" rx="4" fill="#EEF0FF" stroke="#635BFF" stroke-width="1"/>
  <text x="110" y="108" text-anchor="middle" font-size="9" fill="#635BFF">Pod</text>
  <rect x="170" y="94" width="100" height="20" rx="4" fill="#EEF0FF" stroke="#635BFF" stroke-width="1"/>
  <text x="220" y="108" text-anchor="middle" font-size="9" fill="#635BFF">Pod</text>

  <!-- Arrows down from pods - left side -->
  <line x1="110" y1="120" x2="110" y2="165" stroke="#DC2626" stroke-width="1.5" stroke-dasharray="3,2"/>
  <polygon points="105,163 110,173 115,163" fill="#DC2626"/>
  <line x1="220" y1="120" x2="220" y2="165" stroke="#DC2626" stroke-width="1.5" stroke-dasharray="3,2"/>
  <polygon points="215,163 220,173 225,163" fill="#DC2626"/>

  <!-- Labels cross-node -->
  <text x="165" y="148" text-anchor="middle" font-size="8" fill="#DC2626">cross-node UDP</text>

  <!-- Node 2 with CoreDNS -->
  <rect x="30" y="175" width="270" height="44" rx="6" fill="#F6F8FA" stroke="#E6EBF1" stroke-width="1"/>
  <text x="55" y="189" font-size="9" fill="#425466">Nodo B</text>
  <rect x="90" y="183" width="150" height="28" rx="4" fill="#FEF3C7" stroke="#F59E0B" stroke-width="1.5"/>
  <text x="165" y="197" text-anchor="middle" font-size="9" font-weight="700" fill="#92400E">CoreDNS Pod</text>
  <text x="165" y="207" text-anchor="middle" font-size="8" fill="#92400E">kube-system</text>

  <!-- Problems list left -->
  <rect x="30" y="232" width="270" height="130" rx="6" fill="#FEF2F2" stroke="#FECACA" stroke-width="1"/>
  <text x="165" y="250" text-anchor="middle" font-size="9" font-weight="700" fill="#DC2626">Problemas</text>
  <text x="44" y="268" font-size="9" fill="#425466">→ Salto de red entre nodos</text>
  <text x="44" y="284" font-size="9" fill="#425466">→ Presión sobre conntrack</text>
  <text x="44" y="300" font-size="9" fill="#425466">→ Pérdida de paquetes UDP</text>
  <text x="44" y="316" font-size="9" fill="#425466">→ Latencia tail elevada</text>
  <text x="44" y="332" font-size="9" fill="#425466">→ CoreDNS como SPOF de carga</text>
  <text x="44" y="348" font-size="9" fill="#425466">→ Timeout 5s si paquete se pierde</text>

  <!-- === RIGHT SIDE: Con NodeLocal === -->
  <text x="495" y="72" text-anchor="middle" font-size="11" font-weight="700" fill="#16A34A">Con NodeLocal DNSCache</text>

  <!-- Node 1 right -->
  <rect x="360" y="88" width="270" height="80" rx="6" fill="#F6F8FA" stroke="#E6EBF1" stroke-width="1"/>
  <text x="385" y="102" font-size="9" fill="#425466">Nodo A</text>
  <rect x="390" y="108" width="90" height="20" rx="4" fill="#EEF0FF" stroke="#635BFF" stroke-width="1"/>
  <text x="435" y="122" text-anchor="middle" font-size="9" fill="#635BFF">Pod</text>
  <rect x="490" y="108" width="90" height="20" rx="4" fill="#EEF0FF" stroke="#635BFF" stroke-width="1"/>
  <text x="535" y="122" text-anchor="middle" font-size="9" fill="#635BFF">Pod</text>

  <!-- Arrows to local cache -->
  <line x1="435" y1="128" x2="435" y2="148" stroke="#16A34A" stroke-width="1.5"/>
  <polygon points="430,146 435,156 440,146" fill="#16A34A"/>
  <line x1="535" y1="128" x2="535" y2="148" stroke="#16A34A" stroke-width="1.5"/>
  <polygon points="530,146 535,156 540,146" fill="#16A34A"/>

  <!-- NodeLocal cache box inside node -->
  <rect x="400" y="152" width="200" height="20" rx="4" fill="#DCFCE7" stroke="#86EFAC" stroke-width="1.5"/>
  <text x="500" y="166" text-anchor="middle" font-size="9" font-weight="700" fill="#16A34A">NodeLocal DNSCache</text>

  <!-- Arrow to CoreDNS right - only if miss -->
  <line x1="500" y1="175" x2="500" y2="215" stroke="#CBD5E1" stroke-width="1" stroke-dasharray="3,2"/>
  <polygon points="495,213 500,223 505,213" fill="#CBD5E1"/>
  <text x="514" y="200" font-size="8" fill="#94A3B8">cache miss</text>

  <!-- CoreDNS right - smaller, less traffic -->
  <rect x="390" y="225" width="220" height="32" rx="4" fill="#FEF3C7" stroke="#F59E0B" stroke-width="1"/>
  <text x="500" y="243" text-anchor="middle" font-size="9" fill="#92400E">CoreDNS · tráfico reducido</text>

  <!-- Benefits list right -->
  <rect x="360" y="270" width="270" height="92" rx="6" fill="#F0FDF4" stroke="#86EFAC" stroke-width="1"/>
  <text x="495" y="288" text-anchor="middle" font-size="9" font-weight="700" fill="#16A34A">Beneficios</text>
  <text x="374" y="306" font-size="9" fill="#425466">→ Resolución local en el mismo nodo</text>
  <text x="374" y="322" font-size="9" fill="#425466">→ Sin presión sobre conntrack</text>
  <text x="374" y="338" font-size="9" fill="#425466">→ Latencia tail &lt;1ms para hits</text>
  <text x="374" y="354" font-size="9" fill="#425466">→ CoreDNS solo recibe cache misses</text>

</svg>
